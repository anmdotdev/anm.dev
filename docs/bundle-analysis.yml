name: Bundle Analysis (App)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/app/**"
      - "packages/**"
      - "bun.lock"
      - "turbo.json"
      - "package.json"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  bundle-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/app

    permissions:
      contents: read
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache bun global store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Restore dependencies and turbo
        id: restore-deps
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .turbo
            apps/*/node_modules
            packages/*/node_modules
            packages/sync/packages/*/node_modules
            packages/sync/example/*/node_modules
          key: ${{ runner.os }}-deps-turbo-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-deps-turbo-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        if: steps.restore-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build with Rsdoctor + source maps enabled
        run: RSDOCTOR=true BUNDLE_ANALYSIS=true bun run rsbuild build

      - name: Generate source map explorer report
        run: |
          bunx source-map-explorer dist/static/js/*.js --html ../../sourcemap-report.html --no-border-checks 2>/dev/null || true
          # Clean up source maps so they don't pollute artifacts
          find dist -name '*.map' -delete

      # ── Push to main: save baseline ──

      - name: Generate baseline
        if: github.event_name == 'push'
        run: bun scripts/analyze-bundle.js --output ../../bundle-baseline.json

      - name: Save baseline to cache
        if: github.event_name == 'push'
        uses: actions/cache/save@v5
        with:
          path: bundle-baseline.json
          key: bundle-baseline-main-${{ github.sha }}

      - name: Upload Rsdoctor data (baseline)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: rsdoctor-baseline
          path: apps/app/dist/rsdoctor-data.json
          retention-days: 90
          overwrite: true

      - name: Upload source map report (baseline)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: sourcemap-report-baseline
          path: sourcemap-report.html
          retention-days: 90
          overwrite: true
          if-no-files-found: ignore

      # ── Pull request: download baseline, analyze, comment ──

      - name: Restore baseline from cache
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v5
        with:
          path: bundle-baseline.json
          key: bundle-baseline-main-
          restore-keys: |
            bundle-baseline-main-

      - name: Run bundle analysis
        if: github.event_name == 'pull_request'
        run: |
          BASELINE_ARG=""
          if [ -f ../../bundle-baseline.json ]; then
            BASELINE_ARG="--baseline ../../bundle-baseline.json"
          fi
          bun scripts/analyze-bundle.js $BASELINE_ARG --output ../../bundle-report.json --markdown ../../bundle-comment.md

      - name: Upload Rsdoctor data (PR)
        id: upload-rsdoctor
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: rsdoctor-report
          path: apps/app/dist/rsdoctor-data.json
          retention-days: 30

      - name: Upload source map report (PR)
        id: upload-sourcemap
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: sourcemap-report
          path: sourcemap-report.html
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload bundle report
        id: upload-bundle
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: bundle-report
          path: bundle-report.json
          retention-days: 30

      - name: Inject artifact links into comment
        if: github.event_name == 'pull_request'
        working-directory: .
        env:
          GITHUB_SERVER: ${{ github.server_url }}
          GITHUB_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RSDOCTOR_ID: ${{ steps.upload-rsdoctor.outputs.artifact-id }}
          SOURCEMAP_ID: ${{ steps.upload-sourcemap.outputs.artifact-id }}
          BUNDLE_ID: ${{ steps.upload-bundle.outputs.artifact-id }}
        run: |
          BASE="${GITHUB_SERVER}/${GITHUB_REPO}/actions/runs/${RUN_ID}/artifacts"
          sed -i "s|__SOURCEMAP_ARTIFACT__|${BASE}/${SOURCEMAP_ID}|g" bundle-comment.md
          sed -i "s|__RSDOCTOR_ARTIFACT__|${BASE}/${RSDOCTOR_ID}|g" bundle-comment.md
          sed -i "s|__BUNDLE_ARTIFACT__|${BASE}/${BUNDLE_ID}|g" bundle-comment.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bundle-analysis
          path: bundle-comment.md

  # ── AI Bundle Review (PR only) ──────────────────────────────────────────
  bundle-review:
    if: github.event_name == 'pull_request'
    needs: bundle-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download bundle report
        uses: actions/download-artifact@v8
        with:
          name: bundle-report
          path: ./bundle-data

      - name: Restore baseline from cache
        uses: actions/cache/restore@v5
        with:
          path: bundle-baseline.json
          key: bundle-baseline-main-
          restore-keys: |
            bundle-baseline-main-

      - name: Prepare baseline directory
        run: |
          if [ -f bundle-baseline.json ]; then
            mkdir -p baseline-data
            cp bundle-baseline.json baseline-data/bundle-baseline.json
          fi

      - name: Find existing Bundle Doctor review
        id: find-review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REVIEW_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            --jq '.[] | select(.body != null) | select(.body | contains("<!-- bundle-doctor-review -->")) | .id' | head -1)

          if [ -n "$REVIEW_ID" ]; then
            echo "Found existing review: $REVIEW_ID"
            echo "review_id=$REVIEW_ID" >> $GITHUB_OUTPUT
          else
            echo "No existing review found"
            echo "review_id=" >> $GITHUB_OUTPUT
          fi

      - name: Dismiss existing Bundle Doctor review
        if: steps.find-review.outputs.review_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/${{ steps.find-review.outputs.review_id }}/dismissals" \
            -f message="Superseded by updated review" || echo "Could not dismiss review (may already be dismissed)"

      - name: Run Bundle Doctor Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are Bundle Doctor, a frontend bundle size reviewer. Analyze this PR for bundle size impact.

            ## Context

            This is a React SPA built with Rsbuild/Rspack. All static assets use content-hashed filenames and are precached by a service worker. Returning users only re-download files whose content hash changed. Cloudflare serves assets with gzip compression.

            ## Data Available

            1. **Bundle report** (JSON): `./bundle-data/bundle-report.json` — contains per-file sizes (raw + gzip) and category totals for the current PR build.
            2. **Baseline** (JSON, may not exist): `./baseline-data/bundle-baseline.json` — same format, from the main branch.
            3. **PR diff**: Use `git diff origin/${{ github.event.pull_request.base.ref }}...HEAD` to see what code changed.

            ## Your Review

            Read the bundle report and baseline JSONs. Compare them to understand what changed. Then read the PR diff to understand WHY the bundle changed.

            Provide your analysis as a PR review with these sections:

            ### 1. Bundle Impact Summary
            - What is the total gzip size change?
            - How many files changed / are new / were removed?
            - What is the returning user download impact?

            ### 2. What Changed and Why
            - Map the changed chunks back to the code changes in the PR diff
            - Explain which code changes caused which bundle size changes
            - Flag any unexpected bundle changes (e.g., a small code change causing a large bundle increase)

            ### 3. Optimization Opportunities
            - Are there any new dependencies that could be lazy-loaded instead?
            - Are there large modules that could be code-split?
            - Could any imports be more specific (e.g., importing only what's needed from a library)?
            - Are there any tree-shaking issues visible from the changes?
            - Flag if the initial load chunks grew significantly

            ### 4. Verdict
            Give one of these assessments:
            - **✅ No concerns** — Bundle impact is minimal or expected
            - **⚠️ Worth reviewing** — Some optimization opportunities exist
            - **🚨 Needs attention** — Significant unexpected bundle increase

            ## Output Format

            Start your review summary with `<!-- bundle-doctor-review -->` on its own line (used to identify and update this comment on subsequent pushes).

            If specific code changes are causing bundle bloat, leave inline review comments on the relevant lines explaining the impact and suggesting alternatives.

            Keep the review concise and actionable. Don't repeat raw numbers that are already in the bundle analysis comment — focus on insights and recommendations.

            If there is no baseline available (first run), just summarize the current bundle composition and note any obvious optimization opportunities.
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 20 --allowed-tools 'Bash(gh:*)' --allowed-tools 'Bash(git:*)' --allowed-tools 'Bash(cat:*)' --allowed-tools 'Bash(jq:*)' --allowed-tools Read"